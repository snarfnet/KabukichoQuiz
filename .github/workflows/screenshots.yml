name: Take Screenshots

on:
  workflow_dispatch:

jobs:
  screenshots:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: |
        XCODE_APP=$(ls /Applications/ | grep -E "^Xcode_2[6-9]|^Xcode_[3-9][0-9]" | sort -V | tail -1)
        if [ -n "$XCODE_APP" ]; then
          sudo xcode-select -s "/Applications/$XCODE_APP"
        else
          XCODE_APP=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1)
          sudo xcode-select -s "/Applications/$XCODE_APP"
        fi
        xcodebuild -version

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode project
      run: |
        cd NazoNazo
        xcodegen generate

    - name: Resolve SPM packages
      run: |
        cd NazoNazo
        xcodebuild -resolvePackageDependencies \
          -project NazoNazo.xcodeproj \
          -scheme NazoNazo

    - name: Run UI Tests for Screenshots
      run: |
        cd NazoNazo
        xcodebuild test \
          -project NazoNazo.xcodeproj \
          -scheme NazoNazoUITests \
          -destination "platform=iOS Simulator,name=iPhone 16 Pro Max" \
          -resultBundlePath TestResults.xcresult \
          CODE_SIGN_STYLE=Automatic \
          DEVELOPMENT_TEAM=83VGKGSQUH || true

    - name: Extract Screenshots
      run: |
        mkdir -p screenshots
        cd NazoNazo

        echo "=== xcresulttool version ==="
        xcrun xcresulttool version 2>&1 || true

        echo "=== Listing xcresult contents ==="
        find TestResults.xcresult -type f 2>/dev/null | head -50

        echo "=== Trying xcresulttool get test-results ==="
        xcrun xcresulttool get test-results tests --path TestResults.xcresult 2>/dev/null > /tmp/tests.json || true

        echo "=== Trying xcresulttool get object ==="
        xcrun xcresulttool get --path TestResults.xcresult --format json 2>/dev/null > /tmp/result.json || true

        # Method 1: Use xcresulttool to enumerate and export attachments
        python3 << 'PYEOF'
        import json, subprocess, os, sys

        def try_new_format():
            """Try Xcode 16+ xcresulttool format"""
            try:
                result = subprocess.run(
                    ['xcrun', 'xcresulttool', 'get', 'test-results', 'tests', '--path', 'TestResults.xcresult'],
                    capture_output=True, text=True
                )
                if result.returncode == 0:
                    data = json.loads(result.stdout)
                    print(f"New format data keys: {list(data.keys()) if isinstance(data, dict) else type(data)}", file=sys.stderr)
                    return data
            except Exception as e:
                print(f"New format failed: {e}", file=sys.stderr)
            return None

        def try_legacy_format():
            """Try legacy xcresulttool format"""
            try:
                result = subprocess.run(
                    ['xcrun', 'xcresulttool', 'get', '--path', 'TestResults.xcresult', '--format', 'json'],
                    capture_output=True, text=True
                )
                if result.returncode == 0:
                    return json.loads(result.stdout)
            except Exception as e:
                print(f"Legacy format failed: {e}", file=sys.stderr)
            return None

        def find_attachment_refs(obj, refs=None):
            if refs is None:
                refs = []
            if isinstance(obj, dict):
                type_name = obj.get('_type', {}).get('_name', '')
                if type_name == 'ActionTestAttachment':
                    ref_id = obj.get('payloadRef', {}).get('id', {}).get('_value', '')
                    name = obj.get('name', {}).get('_value', 'screenshot')
                    if ref_id:
                        refs.append((ref_id, name))
                        print(f"Found attachment: {name} -> {ref_id}", file=sys.stderr)
                for v in obj.values():
                    find_attachment_refs(v, refs)
            elif isinstance(obj, list):
                for item in obj:
                    find_attachment_refs(item, refs)
            return refs

        def export_attachment(ref_id, name, output_dir):
            output_path = os.path.join(output_dir, f"{name}.png")
            # Try new export syntax
            result = subprocess.run(
                ['xcrun', 'xcresulttool', 'export', '--path', 'TestResults.xcresult',
                 '--id', ref_id, '--output-path', output_path, '--type', 'file'],
                capture_output=True, text=True
            )
            if result.returncode == 0 and os.path.exists(output_path):
                print(f"Exported: {output_path} ({os.path.getsize(output_path)} bytes)")
                return True
            # Try alternate syntax
            result = subprocess.run(
                ['xcrun', 'xcresulttool', 'get', '--path', 'TestResults.xcresult',
                 '--id', ref_id],
                capture_output=True
            )
            if result.returncode == 0 and result.stdout:
                with open(output_path, 'wb') as f:
                    f.write(result.stdout)
                print(f"Exported (get): {output_path} ({os.path.getsize(output_path)} bytes)")
                return True
            print(f"Failed to export {name}: {result.stderr}", file=sys.stderr)
            return False

        output_dir = "../screenshots"

        # Try legacy format first (has attachment refs)
        data = try_legacy_format()
        if data:
            refs = find_attachment_refs(data)
            if refs:
                for ref_id, name in refs:
                    export_attachment(ref_id, name, output_dir)
            else:
                print("No attachment refs found in legacy format", file=sys.stderr)
                # Dump structure for debugging
                print(json.dumps(data, indent=2)[:3000], file=sys.stderr)

        # Try new format
        new_data = try_new_format()
        if new_data:
            # New format might have different structure
            print(json.dumps(new_data, indent=2)[:3000], file=sys.stderr)
        PYEOF

        # Method 2: Try simscreen / screenshots from simulator directly
        echo "=== Checking screenshots directory ==="
        ls -la ../screenshots/ || echo "No screenshots found"

        # Method 3: If no screenshots extracted, take them via simctl
        if [ ! -f ../screenshots/01_home.png ]; then
          echo "=== Falling back to simctl screenshots ==="
          BOOTED_DEVICE=$(xcrun simctl list devices booted -j | python3 -c "
        import json,sys
        data=json.load(sys.stdin)
        for runtime,devices in data.get('devices',{}).items():
            for d in devices:
                if d.get('state')=='Booted':
                    print(d['udid'])
                    sys.exit(0)
        " 2>/dev/null)
          if [ -n "$BOOTED_DEVICE" ]; then
            echo "Found booted device: $BOOTED_DEVICE"
            xcrun simctl io "$BOOTED_DEVICE" screenshot ../screenshots/01_home.png 2>/dev/null || true
          fi
        fi

        echo "=== Final screenshots ==="
        ls -la ../screenshots/

    - name: Upload Screenshots
      uses: actions/upload-artifact@v4
      with:
        name: app-screenshots
        path: screenshots/
        retention-days: 30
