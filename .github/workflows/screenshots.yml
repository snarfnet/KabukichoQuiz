name: Take Screenshots

on:
  workflow_dispatch:

jobs:
  screenshots:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: |
        XCODE_APP=$(ls /Applications/ | grep -E "^Xcode_2[6-9]|^Xcode_[3-9][0-9]" | sort -V | tail -1)
        if [ -n "$XCODE_APP" ]; then
          sudo xcode-select -s "/Applications/$XCODE_APP"
        else
          XCODE_APP=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1)
          sudo xcode-select -s "/Applications/$XCODE_APP"
        fi
        xcodebuild -version

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode project
      run: |
        cd NazoNazo
        xcodegen generate

    - name: Resolve SPM packages
      run: |
        cd NazoNazo
        xcodebuild -resolvePackageDependencies \
          -project NazoNazo.xcodeproj \
          -scheme NazoNazo

    - name: Run UI Tests for Screenshots
      run: |
        cd NazoNazo
        xcodebuild test \
          -project NazoNazo.xcodeproj \
          -scheme NazoNazoUITests \
          -destination "platform=iOS Simulator,name=iPhone 16 Pro Max" \
          -resultBundlePath TestResults.xcresult \
          CODE_SIGN_STYLE=Automatic \
          DEVELOPMENT_TEAM=83VGKGSQUH || true

    - name: Extract Screenshots
      run: |
        mkdir -p screenshots
        cd NazoNazo

        echo "=== xcresulttool help ==="
        xcrun xcresulttool get test-results --help 2>&1 | head -20 || true

        echo "=== Try: get test-results attachments ==="
        xcrun xcresulttool get test-results attachments --path TestResults.xcresult --output-path /tmp/attachments 2>&1 || true
        ls -laR /tmp/attachments/ 2>/dev/null || echo "No /tmp/attachments dir"

        echo "=== Try: xcresulttool get test-results tests with attachments ==="
        xcrun xcresulttool get test-results tests --path TestResults.xcresult 2>/dev/null > /tmp/tests.json || true

        # Parse the new format to find attachment info
        python3 << 'PYEOF'
        import json, subprocess, os, sys, glob

        # Check if attachments were exported to /tmp/attachments
        attachment_dir = "/tmp/attachments"
        if os.path.isdir(attachment_dir):
            for root, dirs, files in os.walk(attachment_dir):
                for f in files:
                    src = os.path.join(root, f)
                    dst = os.path.join("../screenshots", f)
                    print(f"Copying {src} -> {dst}")
                    import shutil
                    shutil.copy2(src, dst)

        # Also parse test-results JSON for attachment references
        try:
            with open("/tmp/tests.json") as f:
                data = json.load(f)
            print(f"Test results keys: {list(data.keys())}", file=sys.stderr)

            def find_nodes_with_attachments(node, path=""):
                name = node.get("name", "")
                current_path = f"{path}/{name}" if path else name
                attachments = node.get("attachments", [])
                if attachments:
                    print(f"Node {current_path} has {len(attachments)} attachments", file=sys.stderr)
                    for att in attachments:
                        print(f"  Attachment: {json.dumps(att, indent=2)}", file=sys.stderr)
                for child in node.get("children", []):
                    find_nodes_with_attachments(child, current_path)

            for node in data.get("testNodes", []):
                find_nodes_with_attachments(node)
        except Exception as e:
            print(f"Parse error: {e}", file=sys.stderr)

        PYEOF

        # If still no screenshots, try direct export from xcresult data blobs
        if [ ! -f ../screenshots/01_home.png ]; then
          echo "=== Trying to find large data blobs (likely screenshots) ==="
          for blob in $(find TestResults.xcresult/Data -name "data.*" -type f -size +50k 2>/dev/null); do
            FNAME=$(basename "$blob")
            # Check if it's a PNG by magic bytes
            if python3 -c "
        import sys
        with open('$blob','rb') as f:
            header=f.read(8)
            if header[:4]==b'\x89PNG':
                sys.exit(0)
            else:
                sys.exit(1)
        " 2>/dev/null; then
              INDEX=$(ls ../screenshots/*.png 2>/dev/null | wc -l | tr -d ' ')
              cp "$blob" "../screenshots/screenshot_${INDEX}.png"
              echo "Found PNG blob: $blob -> screenshot_${INDEX}.png"
            fi
          done
        fi

        echo "=== Final screenshots ==="
        ls -la ../screenshots/

    - name: Upload Screenshots
      uses: actions/upload-artifact@v4
      with:
        name: app-screenshots
        path: screenshots/
        retention-days: 30
