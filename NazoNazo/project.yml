name: NazoNazo
options:
  bundleIdPrefix: com.snarfnet
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads
    from: "12.6.0"

targets:
  NazoNazo:
    type: application
    platform: iOS
    sources:
      - NazoNazo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.snarfnet.nazonazo
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: NazoNazo/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 83VGKGSQUH
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: "私のなぞなぞ解けるかなぁ！？"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.trivia-games"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown"
    dependencies:
      - package: GoogleMobileAds

  NazoNazoUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - NazoNazoUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.snarfnet.nazonazo.uitests
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 83VGKGSQUH
        SWIFT_VERSION: "5.0"
    dependencies:
      - target: NazoNazo
